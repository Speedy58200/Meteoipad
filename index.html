<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MétéoiPad</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <header>

        <div class="clock">
            <div id="time">00:00</div>
            <div id="date">Chargement...</div>
        </div>

        <div class="city" id="city">
            Cosne-sur-Loire
        </div>

    </header>


    <main>

        <div class="weather-main">

            <img id="icon"
                 src=""
                 alt="Météo">

            <div id="temp">--°</div>

            <div id="description">
                Chargement...
            </div>

        </div>


        <div class="cards">

            <div class="card">
                <h3>💨 Vent</h3>
                <p id="wind">-- km/h</p>
            </div>

            <div class="card">
                <h3>💧 Humidité</h3>
                <p id="humidity">-- %</p>
            </div>

            <div class="card">
                <h3>🌡️ Pression</h3>
                <p id="pressure">---- hPa</p>
            </div>

            <div class="card">
                <h3>😊 Ressenti</h3>
                <p id="feels">--°</p>
            </div>

        </div>


        <section class="forecast24">

            <h2>Prévisions 24 heures</h2>

            <div id="hourlyForecast">

            </div>

        </section>


        <section class="forecast7">

            <h2>Prévisions 7 jours</h2>

            <div id="dailyForecast">

            </div>

        </section>

    </main>

</div>

<script src="config.js"></script>
<script src="script.js"></script>

</body>
</html>
