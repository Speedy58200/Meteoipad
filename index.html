<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MétéoiPad</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="container">

    <header>

        <div class="clock">
            <div id="time">00:00</div>
            <div id="date">Chargement...</div>
        </div>

        <div class="weather-now">

            <img id="icon" src="" alt="Météo">

            <div class="temp">
                <div id="temp">--°</div>
                <div id="city">Cosne-sur-Loire</div>
                <div id="description">Chargement...</div>
            </div>

        </div>

    </header>

    <section class="infos">

        <div class="card">
            <h3>💨 Vent</h3>
            <span id="wind">-- km/h</span>
        </div>

        <div class="card">
            <h3>💧 Humidité</h3>
            <span id="humidity">-- %</span>
        </div>

        <div class="card">
            <h3>🌡 Pression</h3>
            <span id="pressure">----</span>
        </div>

        <div class="card">
            <h3>🥵 Ressenti</h3>
            <span id="feels">--°</span>
        </div>

    </section>

    <section>

        <h2>Prévisions 24 heures</h2>

        <div id="hourly" class="forecast-row"></div>

    </section>

    <section>

        <h2>Prévisions 7 jours</h2>

        <div id="daily" class="forecast-row"></div>

    </section>

</div>

<script src="config.js"></script>
<script src="script.js"></script>

</body>
</html>
